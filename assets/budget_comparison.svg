<rect x="44" y="545" width="1272" height="72" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
<text x="72" y="576" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="650" fill="#334155">Arithmetic mean accepted length: DFlash 6.24, ReTree budget 32 7.84, ReTree budget 64 8.29.</text>
<text x="72" y="602" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="400" fill="#475569">Use budget 32 for tighter per-user node budgets; use budget 64 for stronger single-request speedup.</text>
