<text x="44" y="92" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="400" fill="#475569">ReTree budget 32 captures 96.7% of budget 64 speedup while using half the tree nodes.</text>
