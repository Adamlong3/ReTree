<text x="908.7866666666667" y="196" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="750" fill="#94a3b8">4.82x</text>
<text x="908.7866666666667" y="223" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="500" fill="#475569">accepted length 6.24</text>
<text x="44" y="334" text-anchor="start" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="650" fill="#334155">ReTree budget 32</text>
